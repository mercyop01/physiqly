server.port=8080

# --- Main Database Connection ---
# This single backend will connect to your main 'parthgupta' PostgreSQL database.
# Spring Data JPA will automatically create all the necessary tables.
spring.datasource.url=jdbc:postgresql://localhost:5432/parthgupta
spring.datasource.username=parthgupta
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA/Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

